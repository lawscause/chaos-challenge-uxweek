<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="form-card">
      <div class="hero">
        <img src="assets/hot-cheetah-header.png" alt="Checkout header image">
        <div class="hero-copy">
          <p class="eyebrow">Secure Checkout</p>
          <h1>Complete your order</h1>
        </div>
      </div>

      <form
  name="checkout"
  method="POST"
  data-netlify="true"
  action="/confirmation.html"
>
        <div class="section-heading">
          <span>1</span>
          <div>
            <h2>Contact</h2>
          </div>
        </div>

        <div class="field-grid">
          <label class="field field-wide" for="fullname">
            <span>Full Name *</span>
            <input id="fullname" type="text" name="fullname" minlength="2" required>
          </label>

          <label class="field" for="email">
            <span>Email *</span>
            <input id="email" type="email" name="email" required>
          </label>

          <label class="field" for="phone">
            <span>Phone</span>
            <input id="phone" type="tel" name="phone" pattern="[0-9+\-\s()]{7,20}" title="Enter a valid phone number">
          </label>
        </div>

        <div class="section-heading">
          <span>2</span>
          <div>
            <h2>Delivery</h2>
          </div>
        </div>

        <fieldset class="address-group">
          <legend>Shipping Address *</legend>

          <div class="field-grid">
            <label class="field field-wide" for="shipping_street">
              <span>Street Address *</span>
              <input id="shipping_street" type="text" name="shipping_street" required>
            </label>

            <label class="field field-wide" for="shipping_street_2">
              <span>Street Address Line 2</span>
              <input id="shipping_street_2" type="text" name="shipping_street_2">
            </label>

            <label class="field" for="shipping_city">
              <span>City *</span>
              <input id="shipping_city" type="text" name="shipping_city" required>
            </label>

            <label class="field" for="shipping_state">
              <span>State *</span>
              <select id="shipping_state" name="shipping_state" required>
                <option value="">- Select -</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
              </select>
            </label>

            <label class="field" for="shipping_zip">
              <span>ZIP Code *</span>
              <input id="shipping_zip" type="text" name="shipping_zip" pattern="[0-9]{5}(-[0-9]{4})?" title="Use 12345 or 12345-6789 format" required>
            </label>

            <label class="field" for="preferred_delivery_date">
              <span>Preferred Delivery Date *</span>
              <input id="preferred_delivery_date" type="date" name="preferred_delivery_date" required>
            </label>
          </div>
        </fieldset>

        <div class="section-heading">
          <span>3</span>
          <div>
            <h2>Credit Card Details</h2>
          </div>
        </div>

        <div class="field-grid">
          <label class="field field-wide" for="card_number">
            <span>Card Number *</span>
            <input id="card_number" type="text" name="card_number" inputmode="numeric" pattern="[0-9]{15,16}" title="Card number must be 15 to 16 digits" required>
          </label>

          <label class="field" for="expiration_date">
            <span>Expiration Date *</span>
            <input id="expiration_date" type="text" name="expiration_date" placeholder="MM/YY" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" title="Use MM/YY format" required>
          </label>

          <label class="field" for="cvv">
            <span>CVV *</span>
            <input id="cvv" type="text" name="cvv" inputmode="numeric" pattern="[0-9]{3,4}" title="CVV must be 3 or 4 digits" required>
          </label>
        </div>

        <div class="section-heading">
          <span>4</span>
          <div>
            <h2>Billing</h2>
          </div>
        </div>

        <fieldset class="address-group">
          <legend>Billing Address *</legend>

          <div class="field-grid">
            <label class="field field-wide" for="billing_street">
              <span>Street Address *</span>
              <input id="billing_street" type="text" name="billing_street" required>
            </label>

            <label class="field field-wide" for="billing_street_2">
              <span>Street Address Line 2</span>
              <input id="billing_street_2" type="text" name="billing_street_2">
            </label>

            <label class="field" for="billing_city">
              <span>City *</span>
              <input id="billing_city" type="text" name="billing_city" required>
            </label>

            <label class="field" for="billing_state">
              <span>State *</span>
              <select id="billing_state" name="billing_state" required>
                <option value="">- Select -</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
              </select>
            </label>

            <label class="field" for="billing_zip">
              <span>ZIP Code *</span>
              <input id="billing_zip" type="text" name="billing_zip" pattern="[0-9]{5}(-[0-9]{4})?" title="Use 12345 or 12345-6789 format" required>
            </label>

            <label class="field" for="discount_code">
              <span>Discount Code</span>
              <input id="discount_code" type="text" name="discount_code" pattern="[A-Za-z0-9]{0,20}" title="Discount code can use letters and numbers only">
            </label>
          </div>
        </fieldset>

        <div class="preference-panel">
          <label class="choice" for="accept_terms">
            <input id="accept_terms" type="checkbox" name="accept_terms" required>
            <span>I accept the terms and conditions *</span>
          </label>

          <label class="choice" for="update_optin">
            <input id="update_optin" type="checkbox" name="update_optin">
            <span>Opt in for updates from this company</span>
          </label>
        </div>
        <input type="hidden" name="form-name" value="checkout">
        <button class="submit-button" type="submit">Submit Order</button>
        <p class="shipping-policy">
          Products are available for shipment only within the 50 United States. Orders with shipping or billing addresses outside the 50 states cannot be processed.
        </p>
      </form>
    </section>
  </main>
</body>
</html>
