<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="form-card">
      <div class="hero">
        <img src="assets/hot-cheetah-header.png" alt="Checkout header image">
        <div class="hero-copy">
          <p class="eyebrow">Secure Checkout</p>
          <h1>Complete your order</h1>
        </div>
      </div>

      <form action="/confirmation" method="post">
        <div class="section-heading">
          <span>1</span>
          <div>
            <h2>Contact</h2>
          </div>
        </div>

        <div class="field-grid">
          <label class="field field-wide" for="fullname">
            <span>Full Name *</span>
            <input id="fullname" type="text" name="fullname" minlength="2" required>
          </label>

          <label class="field" for="email">
            <span>Email *</span>
            <input id="email" type="email" name="email" required>
          </label>

          <label class="field" for="phone">
            <span>Phone</span>
            <input id="phone" type="tel" name="phone" pattern="[0-9+\-\s()]{7,20}" title="Enter a valid phone number">
          </label>
        </div>

        <div class="section-heading">
          <span>2</span>
          <div>
            <h2>Delivery</h2>
          </div>
        </div>

        <div class="field-grid">
          <label class="field field-wide" for="shipping_address">
            <span>Shipping Address *</span>
            <textarea id="shipping_address" name="shipping_address" rows="4" minlength="5" required></textarea>
          </label>

          <label class="field" for="preferred_delivery_date">
            <span>Preferred Delivery Date *</span>
            <input id="preferred_delivery_date" type="date" name="preferred_delivery_date" required>
          </label>
        </div>

        <div class="section-heading">
          <span>3</span>
          <div>
            <h2>Credit Card Details</h2>
          </div>
        </div>

        <div class="field-grid">
          <label class="field field-wide" for="card_number">
            <span>Card Number *</span>
            <input id="card_number" type="text" name="card_number" inputmode="numeric" pattern="[0-9]{13,19}" title="Card number must be 13 to 19 digits" required>
          </label>

          <label class="field" for="expiration_date">
            <span>Expiration Date *</span>
            <input id="expiration_date" type="text" name="expiration_date" placeholder="MM/YY" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" title="Use MM/YY format" required>
          </label>

          <label class="field" for="cvv">
            <span>CVV *</span>
            <input id="cvv" type="text" name="cvv" inputmode="numeric" pattern="[0-9]{3,4}" title="CVV must be 3 or 4 digits" required>
          </label>
        </div>

        <div class="section-heading">
          <span>4</span>
          <div>
            <h2>Billing</h2>
          </div>
        </div>

        <div class="field-grid">
          <label class="field field-wide" for="billing_address">
            <span>Billing Address *</span>
            <textarea id="billing_address" name="billing_address" rows="4" minlength="5" required></textarea>
          </label>

          <label class="field" for="discount_code">
            <span>Discount Code</span>
            <input id="discount_code" type="text" name="discount_code" pattern="[A-Za-z0-9]{0,20}" title="Discount code can use letters and numbers only">
          </label>
        </div>

        <div class="preference-panel">
          <label class="choice" for="accept_terms">
            <input id="accept_terms" type="checkbox" name="accept_terms" required>
            <span>I accept the terms and conditions *</span>
          </label>

          <label class="choice" for="update_optin">
            <input id="update_optin" type="checkbox" name="update_optin">
            <span>Opt in for updates from this company</span>
          </label>
        </div>

        <button class="submit-button" type="submit">Submit Order</button>
      </form>
    </section>
  </main>
</body>
</html>
