<!DOCTYPE html>
<html>
    <body> 
        <h1>Checkout</h1>
        <p>Welcome to the checkout page!</p>
            <form action="/confirmation" method="post">
                <input
                    type="text"
                    placeholder="Full Name"
                    required
                    name="fullname"
                    minlength="2"
                >

                <input
                    type="email"
                    placeholder="Email"
                    required
                    name="email"
                >

                <input
                    type="tel"
                    placeholder="Phone"
                    name="phone"
                    pattern="[0-9+\-\s()]{7,20}"
                    title="Enter a valid phone number"
                >

                <input
                    type="text"
                    placeholder="Shipping Address"
                    required
                    name="shipping_address"
                    minlength="5"
                >

                <input
                    type="date"
                    required
                    name="preferred_delivery_date"
                >

                <input
                    type="text"
                    placeholder="Card Number"
                    required
                    name="card_number"
                    inputmode="numeric"
                    pattern="[0-9]{13,19}"
                    title="Card number must be 13 to 19 digits"
                >

                <input
                    type="text"
                    placeholder="Expiration Date (MM/YY)"
                    required
                    name="expiration_date"
                    pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                    title="Use MM/YY format"
                >

                <input
                    type="text"
                    placeholder="CVV"
                    required
                    name="cvv"
                    inputmode="numeric"
                    pattern="[0-9]{3,4}"
                    title="CVV must be 3 or 4 digits"
                >

                <input
                    type="text"
                    placeholder="Billing Address"
                    required
                    name="billing_address"
                    minlength="5"
                >

                <input
                    type="text"
                    placeholder="Discount Code"
                    name="discount_code"
                    pattern="[A-Za-z0-9]{0,20}"
                    title="Discount code can use letters and numbers only"
                >

                <label>
                    <input type="checkbox" name="accept_terms" required>
                    I accept the terms and conditions
                </label>

                <label>
                    <input type="checkbox" name="update_optin">
                    Opt in for updates from this company
                </label>

                <button type="submit">Submit Order</button>
            </form>
    </body>
</html>
